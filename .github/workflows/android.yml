name: Build and Release APK

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      buildType:
        description: "debug or release"
        required: true
        type: choice
        options:
          - debug
          - release
        default: debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: bootdtrap
        run: |
          wget https://github.com/AndroidStudio-App/NeonIDE/releases/download/bootstrap/bootstrap-aarch64.zip
          cp bootstrap-aarch64.zip app/src/main/cpp

      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: |
          sed -i '/android.aapt2FromMavenOverride=/d' gradle.properties

          if [ "${{ github.event.inputs.buildType }}" = "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.buildType == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.buildType }}-apk
          path: app/build/outputs/apk/${{ github.event.inputs.buildType }}/*.apk
          retention-days: 7
