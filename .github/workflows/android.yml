# This workflow will build a debug APK and create a GitHub release when a tag is pushed or manually triggered.

name: Build and Release Debug APK

on:
  push:
    
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: bootdtrap
        run: |
          wget https://github.com/AndroidStudio-App/NeonIDE/releases/download/bootstrap/bootstrap-aarch64.zip
          cp bootstrap-aarch64.zip app/src/main/cpp

      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          sed -i '/android.aapt2FromMavenOverride=/d' gradle.properties
          ./gradlew assembleDebug

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/*.apk
          body: |
            Debug build for ${{ github.ref_name }}
            Built from commit ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload APK as Artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
